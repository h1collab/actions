name: 'Deploy SearXNG'
description: 'Deploy SearXNG search engine and return JSON results'
author: 'h1collab'

inputs:
  port:
    default: '8888'
  image:
    default: 'searxng/searxng:latest'
  healthcheck-timeout:
    default: '60'

outputs:
  status:
    value: ${{ steps.deploy.outputs.status }}
  url:
    value: ${{ steps.deploy.outputs.url }}
  result:
    value: ${{ steps.deploy.outputs.result }}

runs:
  using: 'composite'

  steps:
    - name: Check Docker
      shell: bash
      run: |
        docker --version

    - name: Pull Image
      shell: bash
      run: |
        docker pull ${{ inputs.image }}

    - name: Deploy
      id: deploy
      shell: bash
      run: |

        PORT=${{ inputs.port }}
        IMAGE=${{ inputs.image }}
        TIMEOUT=${{ inputs.healthcheck-timeout }}

        docker rm -f searxng-instance || true

        echo "Starting container..."

        docker run -d \
          --name searxng-instance \
          -p ${PORT}:8080 \
          ${IMAGE}

        echo "Waiting..."

        for i in $(seq 1 $TIMEOUT)
        do
          if curl -s http://localhost:${PORT}/ >/dev/null
          then
            echo "Ready!"
            break
          fi
          sleep 1
        done

        echo "Container logs:"
        docker logs searxng-instance || true

        echo "Testing JSON endpoint..."

        RESULT=$(curl -s \
          -H "Accept: application/json" \
          "http://localhost:${PORT}/search?q=test&format=json")

        echo "Response:"
        echo "$RESULT"

        if echo "$RESULT" | grep -q "403 Forbidden"
        then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "url=http://localhost:${PORT}" >> $GITHUB_OUTPUT

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          exit 1
        fi

        echo "status=success" >> $GITHUB_OUTPUT
        echo "url=http://localhost:${PORT}" >> $GITHUB_OUTPUT

        echo "result<<EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "Done."
