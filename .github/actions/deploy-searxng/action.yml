name: 'Deploy SearXNG'
description: 'Deploy SearXNG search engine and return JSON results'
author: 'h1collab'

inputs:
  port:
    description: 'Port to run SearXNG on'
    required: false
    default: '8888'

  image:
    description: 'Docker image'
    required: false
    default: 'searxng/searxng:latest'

  healthcheck-timeout:
    description: 'Timeout in seconds'
    required: false
    default: '60'

outputs:
  status:
    description: 'Deployment status'
    value: ${{ steps.deploy.outputs.status }}

  url:
    description: 'Service URL'
    value: ${{ steps.deploy.outputs.url }}

  result:
    description: 'JSON search result'
    value: ${{ steps.deploy.outputs.result }}

runs:
  using: composite

  steps:

    - name: Check Docker
      shell: bash
      run: |
        docker --version

    - name: Pull Image
      shell: bash
      run: |
        docker pull "${{ inputs.image }}"

    - name: Deploy SearXNG
      id: deploy
      shell: bash
      run: |

        PORT="${{ inputs.port }}"
        IMAGE="${{ inputs.image }}"
        TIMEOUT="${{ inputs.healthcheck-timeout }}"

        docker rm -f searxng-instance || true

        echo "Starting SearXNG..."

        docker run -d \
          --name searxng-instance \
          -p ${PORT}:8080 \
          -v "${GITHUB_ACTION_PATH}/settings.yml:/etc/searxng/settings.yml:ro" \
          ${IMAGE}

        READY=false

        for i in $(seq 1 ${TIMEOUT})
        do
          if curl -s http://localhost:${PORT}/ >/dev/null 2>&1
          then
            READY=true
            echo "SearXNG ready"
            break
          fi

          sleep 1
        done

        if [ "$READY" != "true" ]
        then

          echo "Container failed to start"

          docker logs searxng-instance || true

          echo "status=failure" >> $GITHUB_OUTPUT
          echo "url=" >> $GITHUB_OUTPUT

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "startup timeout"
          echo "EOF" >> $GITHUB_OUTPUT

          exit 1
        fi

        echo "Container logs:"
        docker logs searxng-instance || true

        echo "Testing JSON endpoint..."

        RESULT=$(curl -s \
          "http://localhost:${PORT}/search?q=test&format=json")

        echo "$RESULT"

        if echo "$RESULT" | grep -q "403 Forbidden"
        then

          echo "status=failure" >> $GITHUB_OUTPUT
          echo "url=http://localhost:${PORT}" >> $GITHUB_OUTPUT

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          exit 1
        fi

        echo "status=success" >> $GITHUB_OUTPUT
        echo "url=http://localhost:${PORT}" >> $GITHUB_OUTPUT

        echo "result<<EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "Deployment successful"
